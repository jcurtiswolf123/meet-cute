name: Deploy to Fly

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      # Full production build gate: catch build-time breakage (bad imports, RSC
      # boundary errors, font/axes config) before we ship, not on the Fly builder.
      - run: npm run build
        env:
          # Build only needs the schema/types, not a live DB, but Prisma wants a
          # URL present. A dummy is fine; no queries run at build time.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    concurrency: deploy-meet-cute
    steps:
      - uses: actions/checkout@v4
      # pinned to a commit SHA (supply-chain): superfly/flyctl-actions setup-flyctl
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
