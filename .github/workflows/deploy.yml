name: Deploy to Fly

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meetcute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meetcute"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meetcute?schema=meetcute
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/meetcute?schema=meetcute
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run db:deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:launch
      - run: npm run test:race
      # Full production build gate: catch build-time breakage (bad imports, RSC
      # boundary errors, font/axes config) before we ship, not on the Fly builder.
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Run operator role browser checks
        run: |
          NEXT_PUBLIC_APP_URL="" npm run start > /tmp/meet-cute-role-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3009/healthz > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              tail -100 /tmp/meet-cute-role-server.log
              exit 1
            fi
            sleep 1
          done
          npm run test:launch:roles:e2e

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    concurrency: deploy-meet-cute
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply additive database schema
        run: npm run db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      # pinned to a commit SHA (supply-chain): superfly/flyctl-actions setup-flyctl
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: Deploy
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            flyctl deploy --remote-only --build-secret SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN"
          else
            flyctl deploy --remote-only
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Verify production canary
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 https://hellomeetcute.com/healthz
          curl --fail --silent --show-error --retry 5 --retry-delay 3 https://hellomeetcute.com/readyz
          curl --fail --silent --show-error --retry 5 --retry-delay 3 https://hellomeetcute.com/ > /dev/null
