app = "meet-cute"
primary_region = "sjc"

[build]

[deploy]
  # Apply the Prisma schema to Neon once per deploy (not per instance), so
  # horizontal scaling never races on DDL.
  release_command = "npx prisma db push --skip-generate"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_SITE_URL = "https://meet-cute.fly.dev"

# Legacy SQLite volume, no longer used (DB is on Neon). Kept mounted to avoid a
# detach prompt; safe to remove with `fly deploy -y` later.
[[mounts]]
  source = "meetcute_data"
  destination = "/data"

[http_service]
  internal_port = 3009
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
