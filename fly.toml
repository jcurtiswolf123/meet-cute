app = "meet-cute"
primary_region = "sjc"

[build]

# Schema changes are applied manually with `npx prisma db push` against Neon
# (rare). No release_command, so deploys never block on a DB round-trip from the
# ephemeral release machine.

# Sentry build-time config so plain `fly deploy` always wires error tracking:
# the public DSN is inlined into the client bundle and withSentryConfig activates.
# The DSN is PUBLIC by design (it already ships in client JS), so it is safe here.
# SENTRY_AUTH_TOKEN is deliberately NOT committed (it is a real secret). Source-map
# upload is skipped unless you pass it at deploy time:
#   fly deploy --build-arg SENTRY_AUTH_TOKEN="$(cat ~/.gstack/credentials/sentry-auth-token.txt)"
# Runtime server-side capture uses the SENTRY_DSN Fly secret (set separately).
[build.args]
  SENTRY_DSN = "https://ec7ed63a21303d6dbaf509a8c115bb7b@o4511616620363776.ingest.us.sentry.io/4511649571864576"
  NEXT_PUBLIC_SENTRY_DSN = "https://ec7ed63a21303d6dbaf509a8c115bb7b@o4511616620363776.ingest.us.sentry.io/4511649571864576"
  SENTRY_ORG = "riiva"
  SENTRY_PROJECT = "meet-cute"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_SITE_URL = "https://hellomeetcute.com"

# Legacy SQLite volume removed: the DB lives on Neon and nothing read /data.
# Dropping the per-machine mount lets the app run as a clean, stateless, N-machine
# service (rolling zero-downtime deploys, no per-machine volume to clone).

[http_service]
  internal_port = 3009
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Two machines minimum: no single point of failure, and rolling deploys keep
  # one machine serving while the other is replaced (zero downtime).
  min_machines_running = 2

  # Liveness health check. Fly gates a release on this: a machine that does not
  # return 200 from /healthz is not rolled into service, so a broken build cannot
  # replace a healthy one.
  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
