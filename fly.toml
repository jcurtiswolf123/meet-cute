app = "meet-cute"
primary_region = "sjc"

[build]

# Schema changes are applied by the GitHub deploy job before the rolling Fly
# release. No release_command is used, so Fly does not run a second schema
# operation from an ephemeral machine.

# Sentry build-time config so plain `fly deploy` always wires error tracking:
# the public DSN is inlined into the client bundle and withSentryConfig activates.
# The DSN is PUBLIC by design (it already ships in client JS), so it is safe here.
# SENTRY_AUTH_TOKEN is deliberately NOT committed (it is a real secret). Source-map
# upload is skipped unless you provide a BuildKit secret at deploy time:
#   fly deploy --build-secret SENTRY_AUTH_TOKEN="<value from approved secret store>"
# Runtime server-side capture uses the SENTRY_DSN Fly secret (set separately).
[build.args]
  SENTRY_DSN = "https://ec7ed63a21303d6dbaf509a8c115bb7b@o4511616620363776.ingest.us.sentry.io/4511649571864576"
  NEXT_PUBLIC_SENTRY_DSN = "https://ec7ed63a21303d6dbaf509a8c115bb7b@o4511616620363776.ingest.us.sentry.io/4511649571864576"
  SENTRY_ORG = "riiva"
  SENTRY_PROJECT = "meet-cute"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_SITE_URL = "https://hellomeetcute.com"

# Legacy meetcute_data volume, one per machine. No longer read (DB is on Neon),
# but kept mounted so the config matches the live machines. Fly has no zero-
# downtime way to detach a sticky volume (no detach on `machine update`, deploy
# keeps it, clone re-creates it, `machine run` skips the service/LB), so removing
# these two 1GB volumes needs a maintenance window (destroy both machines, then
# `fly deploy` fresh from a no-mount config). Not worth ~60s of downtime for
# unused storage; retire during a planned window if desired.
[[mounts]]
  source = "meetcute_data"
  destination = "/data"

[http_service]
  internal_port = 3009
  force_https = true
  # Keep both machines always-on: never auto-stop below the minimum, so there is a
  # genuine hot standby (no single point of failure) and no cold-start latency.
  auto_stop_machines = "off"
  auto_start_machines = true
  # Two machines minimum: no single point of failure, and rolling deploys keep
  # one machine serving while the other is replaced (zero downtime).
  min_machines_running = 2

  # Readiness check. Fly only promotes a machine after both Node and Neon answer,
  # so an image with an incompatible schema cannot replace a healthy version.
  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/readyz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
