app = "meet-cute"
primary_region = "sjc"

[build]

# Schema changes are applied manually with `npx prisma db push` against Neon
# (rare). No release_command, so deploys never block on a DB round-trip from the
# ephemeral release machine.

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_SITE_URL = "https://meet-cute.fly.dev"

# Legacy SQLite volume, no longer used (DB is on Neon). Kept mounted to avoid a
# detach prompt; safe to remove with `fly deploy -y` later.
[[mounts]]
  source = "meetcute_data"
  destination = "/data"

[http_service]
  internal_port = 3009
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
